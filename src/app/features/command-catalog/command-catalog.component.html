<section class="catalog">
  <div class="intro">
    <div class="intro-copy">
      <p class="eyebrow">{{ text('eyebrow') }}</p>
      <h1>{{ text('catalogTitle') }}</h1>
      <p class="summary">
        {{ text('catalogSummary') }}
      </p>
    </div>
  </div>

  <celem-command-toolbar
    [filters]="filters()"
    [projects]="projects()"
    [permissions]="permissions()"
    [displayCategory]="displayCategory"
    (filtersChange)="updateFilters($event)" />

  @if (filteredCommands().length > 0) {
    <section class="grid" aria-live="polite">
      @for (command of filteredCommands(); track command.id) {
        <celem-command-card [command]="command" [searchTerm]="filters().query" />
      }
    </section>
  } @else {
    <p class="empty">{{ text('empty') }}</p>
  }
</section>
