<section class="toolbar" aria-label="Command filters">
  <div class="toolbar__desktop">
    <label>
      <span>{{ text('project') }}</span>
      <select [ngModel]="filters.project" (ngModelChange)="update({ project: $event })">
        <option value="">{{ text('allProjects') }}</option>
        @for (project of projects; track project) {
          <option [value]="project">{{ project }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ text('permission') }}</span>
      <select [ngModel]="filters.permission" (ngModelChange)="update({ permission: $event })">
        <option value="">{{ text('allPermissions') }}</option>
        @for (permission of permissions; track permission) {
          <option [value]="permission">{{ displayCategory(permission) }}</option>
        }
      </select>
    </label>

    <label>
      <span>{{ text('sort') }}</span>
      <select [ngModel]="filters.sortMode" (ngModelChange)="updateSortMode($event)">
        <option value="project">{{ text('sortProject') }}</option>
        <option value="command">{{ text('sortCommand') }}</option>
        <option value="permission">{{ text('sortPermission') }}</option>
        <option value="language">{{ text('sortLanguage') }}</option>
      </select>
    </label>
  </div>

  <button
    type="button"
    class="toolbar__toggle"
    [attr.aria-expanded]="isDrawerOpen()"
    aria-haspopup="dialog"
    (click)="openDrawer()">
    {{ text('filters') }}
  </button>

  @if (isDrawerOpen()) {
    <button type="button" class="toolbar__backdrop" [attr.aria-label]="text('filtersClose')" (click)="closeDrawer()"></button>
  }

  <div class="toolbar__drawer" [class.toolbar__drawer--open]="isDrawerOpen()" role="dialog" aria-modal="true" [attr.aria-label]="text('filters')">
    <div class="toolbar__drawer-header">
      <strong>{{ text('filters') }}</strong>
      <button type="button" class="toolbar__drawer-close" (click)="closeDrawer()">
        {{ text('filtersClose') }}
      </button>
    </div>

    <div class="toolbar__drawer-body">
      <label>
        <span>{{ text('project') }}</span>
        <select [ngModel]="filters.project" (ngModelChange)="update({ project: $event })">
          <option value="">{{ text('allProjects') }}</option>
          @for (project of projects; track project) {
            <option [value]="project">{{ project }}</option>
          }
        </select>
      </label>

      <label>
        <span>{{ text('permission') }}</span>
        <select [ngModel]="filters.permission" (ngModelChange)="update({ permission: $event })">
          <option value="">{{ text('allPermissions') }}</option>
          @for (permission of permissions; track permission) {
            <option [value]="permission">{{ displayCategory(permission) }}</option>
          }
        </select>
      </label>

      <label>
        <span>{{ text('sort') }}</span>
        <select [ngModel]="filters.sortMode" (ngModelChange)="updateSortMode($event)">
          <option value="project">{{ text('sortProject') }}</option>
          <option value="command">{{ text('sortCommand') }}</option>
          <option value="permission">{{ text('sortPermission') }}</option>
          <option value="language">{{ text('sortLanguage') }}</option>
        </select>
      </label>
    </div>
  </div>
</section>
