<section class="toolbar" aria-label="Command filters">
  <label class="search">
    <span>{{ text('search') }}</span>
    <input
      type="search"
      [ngModel]="filters.query"
      (ngModelChange)="update({ query: $event })"
      [placeholder]="text('searchPlaceholder')"
      autocomplete="off">
  </label>

  <label>
    <span>{{ text('project') }}</span>
    <select [ngModel]="filters.project" (ngModelChange)="update({ project: $event })">
      <option value="">{{ text('allProjects') }}</option>
      @for (project of projects; track project) {
        <option [value]="project">{{ project }}</option>
      }
    </select>
  </label>

  <label>
    <span>{{ text('permission') }}</span>
    <select [ngModel]="filters.permission" (ngModelChange)="update({ permission: $event })">
      <option value="">{{ text('allPermissions') }}</option>
      @for (permission of permissions; track permission) {
        <option [value]="permission">{{ displayCategory(permission) }}</option>
      }
    </select>
  </label>

  <label>
    <span>{{ text('language') }}</span>
    <select [ngModel]="filters.language" (ngModelChange)="update({ language: $event })">
      <option value="">{{ text('allLanguages') }}</option>
      @for (language of languages; track language) {
        <option [value]="language">{{ displayLanguage(language) }}</option>
      }
    </select>
  </label>

  <label>
    <span>{{ text('sort') }}</span>
    <select [ngModel]="filters.sortMode" (ngModelChange)="updateSortMode($event)">
      <option value="project">{{ text('sortProject') }}</option>
      <option value="command">{{ text('sortCommand') }}</option>
      <option value="permission">{{ text('sortPermission') }}</option>
      <option value="language">{{ text('sortLanguage') }}</option>
    </select>
  </label>
</section>
