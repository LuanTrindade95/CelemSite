<article class="command-card" [class.command-card--list]="viewMode === 'list'">
  <header>
    <div>
      <p class="project">{{ command.projectName }}</p>
      <code [celemHighlightSearch]="command.command" [searchTerm]="searchTerm"></code>
    </div>
    <span class="permission" [class.admin]="command.category.toLowerCase().includes('admin')">{{ displayPermission() }}</span>
  </header>

  <p class="description" [attr.title]="command.description">{{ command.description }}</p>

  @if (command.usage) {
    <section class="usage-block">
      <h3>{{ text('usage') }}</h3>
      <code class="block">{{ command.usage }}</code>
    </section>
  }

  <footer>
    <div class="meta">
      <span class="meta-pill">{{ displayLanguage(command.language) }}</span>
      <span class="meta-pill">{{ displayPermission() }}</span>
      @if (metadataCountLabel(); as countLabel) {
        <span class="meta-count">{{ countLabel }}</span>
      }
    </div>

    <button type="button" class="copy-button" (click)="copyPrimaryUsage()">
      {{ copied() ? text('copied') : text('copy') }}
    </button>
  </footer>
</article>
