<header class="site-header">
  <a class="brand" href="/" aria-label="CelemSite">
    <img src="assets/images/celem-logo.png" alt="Celem" width="54" height="54">
    <span>
      <strong>Reino Sagrado de Celem</strong>
      <small>{{ text('brandSubtitle') }}</small>
    </span>
  </a>

  <div class="header-controls">
    <label class="language-picker">
      <span>{{ text('language') }}</span>
      <select [ngModel]="currentLanguage()" (ngModelChange)="changeLanguage($event)">
        @for (language of languageOptions; track language.code) {
          <option [value]="language.code">{{ language.displayName }}</option>
        }
      </select>
    </label>

    @if (session().user; as user) {
      <div class="header-session">
        <div class="discord-account discord-account--authenticated" [attr.title]="user.displayName">
          <div class="discord-account-copy">
            <strong>{{ user.displayName }}</strong>
            <span>DISCORD</span>
          </div>

          <div class="discord-account-avatar" aria-hidden="true">
            @if (user.avatarUrl) {
              <img [src]="user.avatarUrl" alt="">
            } @else {
              <span>DR</span>
            }
          </div>
        </div>

        <button type="button" class="ghost ghost-inline" (click)="logout()">
          {{ text('logout') }}
        </button>
      </div>
    } @else {
      <button
        type="button"
        class="discord-account discord-account--anonymous"
        [disabled]="isLoadingSession()"
        (click)="login()">
        <span class="discord-account-copy">
          <strong>DISCORD</strong>
          <span>{{ text('login') }}</span>
        </span>

        <span class="discord-account-avatar" aria-hidden="true">
          <span>DR</span>
        </span>
      </button>

      <button type="button" class="discord-button discord-button--compact" [disabled]="isLoadingSession()" (click)="login()">
        {{ text('login') }}
      </button>
    }
  </div>
</header>

<main>
  <ng-content />
</main>
